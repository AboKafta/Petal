<!DOCTYPE html>
<html>
<head>
    <style>
        
        .big-button {
            font-size: 2rem;
            padding: 20px 40px;
            background-color: rgb(204, 164, 241);
            border: 3px solid rgb(118, 199, 249);
            border-radius: 12px;
            cursor: pointer;
        }
        .big-button:hover {
            color: rgb(163, 240, 255);
        }
    </style>
</head>
<body>

    <h6>I love you</h6>
    <h5>I love you</h5>
    <h4>I love you</h4>
    <h3>I love you</h3>
    <h2>I love you</h2>
    <h1>I love you</h1>
    <h2>I love you</h2>
    <h3>I love you</h3>
    <h4>I love you</h4>
    <h5>I love you</h5>
    <h6>I love you</h6>

    <button class="big-button" commandfor="confirm-dialog" command="show-modal">
        CLICK ME!!!
    </button>

    <dialog id="confirm-dialog">
        <header>
            <h1>Do You Love Me?</h1>
        </header>
        <p>Be Sure With Your Answer</p>
        <footer>
            <button commandfor="confirm-dialog" command="close" value="Yes">Yes</button>
            <button commandfor="confirm-dialog" command="close" value="No">No</button>
        </footer>
    </dialog>

    <pre id="log"></pre>

    <video id="kissVideo" width="640" height="360" controls hidden>
        <source src="kisses.mp4" type="video/mp4">
    </video>

    <script>
        const dialog = document.getElementById("confirm-dialog");
        const logEl = document.getElementById("log");
        const video = document.getElementById("kissVideo");

        function log(message) {
            logEl.textContent = message;
        }

        dialog.addEventListener("close", () => {
            switch (dialog.returnValue) {
                case "Yes":
                    log("Omg wait really? I love you too yayyy yipeee.\n Here Are All The Nicknames I Call You: Love, Amor, Petal, My Pretty Petal, Sexy, Cutie,\nMy Pretty Girl, sleepyhead, gorgeous, luscious, my queen, my princess, meu tudo, meu vida \n" +
                    "Here's one of my fav vids of us \n");
                    
                    video.hidden = false;
                    break;
                case "No":
                    log("Oh its fine... I never loved you back anyway...");
                    video.hidden = true;
                    break;
                default:
                    log("Closed with value: " + dialog.returnValue);
            }
        });
    </script>

</body>
</html>
